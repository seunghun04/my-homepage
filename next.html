<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스팸 필터링 프로젝트 - 메인</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Nanum Pen Script', cursive;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.5px;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    background: 
        linear-gradient(-45deg, rgba(238, 242, 243, 0.1), rgba(224, 234, 252, 0.1), rgba(207, 217, 223, 0.1), rgba(226, 235, 240, 0.1)),
        url("프로젝트 v2.png") center no-repeat;
    
    background-attachment: fixed;
    
    /* 💥 index.html의 마지막 크기인 120%에서 최종 크기인 100%로 줌아웃되는 애니메이션 적용 */
    animation: nextPageShrink 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards, gradientMovement 15s ease infinite 0.8s;
}

/* 👇 next.html이 열릴 때 배경이 부드럽게 한 번 더 축소되는 규칙 */
@keyframes nextPageShrink {
    from { background-size: 120% 120%, cover; }
    to { background-size: 100% 100%, cover; }
}

@keyframes gradientMovement {
    0% { background-position: 0% 50%, center; }
    50% { background-position: 100% 50%, center; }
    100% { background-position: 0% 50%, center; }
}

.container{
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(10px);

    width: 90%;            
    max-width: 500px; 
    padding: 35px 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

    /* 배경이 줄어드는 타이밍에 맞춰 조금 더 고급스럽게 페이드인 */
    animation: fadeInUp 1s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
    opacity: 0;
    transform: translateY(40px);
}

h1{
    color:#333;
    margin-bottom:20px;
    font-size: 50px;
    font-weight: 400;
    line-height: 1.1;
}

.info-box {
    font-size: 28px;
    color: #444;
    text-align: left;
    margin-bottom: 30px;
    line-height: 1.4;
}

.info-box li {
    margin-bottom: 10px;
    list-style-type: none;
}

button{
    background:#bacbde; 
    color:white;
    border:none;
    padding:10px 35px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    font-family: 'Nanum Pen Script', cursive;
    font-size: 30px;
    line-height: 1;
}

button:hover{
    background:#64e7f6;
    transform:scale(1.05);
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1>스팸 필터링 기능 검사</h1>
    
    <ul class="info-box">
        <li>📧 스팸 메일의 특징을 AI가 분석합니다.</li>
        <li>🔍 텍스트 내 스팸 키워드를 걸러냅니다.</li>
        <li>안전한 메일함 관리를 시작해 보세요!</li>
    </ul>

    <button onclick="alert('다음 기능 구현 준비 중!')">
        검사하기
    </button>
</div>

</body>
</html>
