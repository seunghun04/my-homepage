<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스팸 필터링 프로젝트</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    /* 👇 전체 글꼴을 'Nanum Pen Script'로 변경 */
    font-family: 'Nanum Pen Script', cursive;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.5px; /* 손글씨의 자연스러운 여백을 위해 자간 미세 조절 */

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    /* 기존 배경 설정 100% 유지 */
    background: 
        linear-gradient(-45deg, rgba(238, 242, 243, 0.1), rgba(224, 234, 252, 0.1), rgba(207, 217, 223, 0.1), rgba(226, 235, 240, 0.1)),
        url("프로젝트 v2.png") center no-repeat;
    
    /* 💥 축소 체감을 극대화하기 위해 평소 기본 크기를 200%로 설정 */
    background-size: 200% 200%, cover;
    background-attachment: fixed;
    
    animation: gradientMovement 15s ease infinite;

    /* 👇 배경 크기가 줄어들 때 0.8초 동안 부드럽게 뒤로 쓱 빠지도록 transition 추가 */
    transition: background-size 0.8s cubic-bezier(0.25, 1, 0.5, 1);
}

/* 👇 버튼 클릭 시 자바스크립트로 실행될 대폭 축소(Zoom-Out) 규칙 */
body.shrink-effect {
    /* 💥 200%였던 그라데이션과 cover였던 패턴을 확 줄여 격자가 촘촘하게 보이게 만듭니다 */
    background-size: 50% 50%, 40%; 
    animation: none; /* 축소 연출 중에는 일렁임 애니메이션 일시 정지 */
}

@keyframes gradientMovement {
    0% {
        background-position: 0% 50%, center;
    }
    50% {
        background-position: 100% 50%, center;
    }
    100% {
        background-position: 0% 50%, center;
    }
}

.container{
    /* 기존 투명도 0.01 및 blur 설정 100% 유지 */
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(10px);

    width: 90%;            
    max-width: 420px;
    
    padding: 25px 35px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

    animation: fadeInUp 1s ease-out forwards;
    opacity: 0;
    transform: translateY(30px);

    /* 👇 버튼 클릭 시 하얀 상자도 부드럽게 사라지도록 transition 추가 */
    transition: opacity 0.5s ease, transform 0.5s ease;
}

/* 👇 버튼 클릭 시 하얀 상자가 스르륵 투명해지며 작아지는 규칙 */
.container.fade-out {
    opacity: 0;
    transform: scale(0.85);
}

h1{
    color:#333;
    margin-bottom:10px;
    /* 👇 나눔펜 폰트 핏에 맞춘 크기와 두께 최적화 */
    font-size: 56px;
    font-weight: 400;
    line-height: 1.1;
}

p{
    color:#555;
    margin-bottom:30px;
    /* 👇 나눔펜 폰트 핏에 맞춘 크기와 두께 최적화 */
    font-size: 34px;
    font-weight: 400;
    line-height: 1.1;
}

button{
    /* 기존 파스텔톤 버튼 색상 유지 */
    background:#bacbde;
    color:white;
    border:none;
    padding:10px 35px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;

    /* 👇 버튼 내부 텍스트 폰트 및 크기 최적화 */
    font-family: 'Nanum Pen Script', cursive;
    font-size: 30px;
    line-height: 1;
}

button:hover{
    /* 기존 호버 효과 유지 */
    background:#64e7f6;
    transform:scale(1.05);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container" id="mainContainer">
    <h1>스팸 필터링 프로젝트</h1>
    <p>원치 않던 메일로 고통받으셨나요?</p>

    <button onclick="startTransition()">
        시작하기
    </button>
</div>

<script>
function startTransition() {
    const body = document.body;
    const container = document.getElementById('mainContainer');

    // 1. 네모 상자를 스르륵 투명하게 만듭니다.
    container.classList.add('fade-out');

    // 2. 전체 배경을 뒤로 확 축소(줌아웃)시킵니다.
    body.classList.add('shrink-effect');

    // 3. 0.8초간 연출을 다 보여준 후 다음 페이지(next.html)로 넘어갑니다.
    setTimeout(function() {
        location.href = 'next.html';
    }, 800); 
}
</script>

</body>
</html>
