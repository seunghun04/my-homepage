<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스팸 필터링 프로젝트</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    /* 👇 전체 글꼴을 'Nanum Pen Script'로 변경 */
    font-family: 'Nanum Pen Script', cursive;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.5px; /* 손글씨의 자연스러운 여백을 위해 자간 미세 조절 */

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    /* 기존 배경 설정 100% 유지 */
    background: 
        linear-gradient(-45deg, rgba(238, 242, 243, 0.1), rgba(224, 234, 252, 0.1), rgba(207, 217, 223, 0.1), rgba(226, 235, 240, 0.1)),
        url("프로젝트 v2.png") center no-repeat;
    
    background-size: 100% 100%, cover;
    background-attachment: fixed;
    
    animation: gradientMovement 15s ease infinite;
}

@keyframes gradientMovement {
    0% {
        background-position: 0% 50%, center;
    }
    50% {
        background-position: 100% 50%, center;
    }
    100% {
        background-position: 0% 50%, center;
    }
}

.container{
    /* 기존 투명도 0.01 및 blur 설정 100% 유지 */
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(10px);

    width: 90%;            
    max-width: 420px;
    
    padding: 25px 35px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

    animation: fadeInUp 1s ease-out forwards;
    opacity: 0;
    transform: translateY(30px);
}

h1{
    color:#333;
    margin-bottom:10px;
    /* 👇 나눔펜 폰트 핏에 맞춘 크기와 두께 최적화 */
    font-size: 56px;
    font-weight: 400;
    line-height: 1.1;
}

p{
    color:#555;
    margin-bottom:30px;
    /* 👇 나눔펜 폰트 핏에 맞춘 크기와 두께 최적화 */
    font-size: 34px;
    font-weight: 400;
    line-height: 1.1;
}

button{
    /* 기존 파스텔톤 버튼 색상 유지 */
    background:#bacbde;
    color:white;
    border:none;
    padding:10px 35px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;

    /* 👇 버튼 내부 텍스트 폰트 및 크기 최적화 */
    font-family: 'Nanum Pen Script', cursive;
    font-size: 30px;
    line-height: 1;
}

button:hover{
    /* 기존 호버 효과 유지 */
    background:#64e7f6;
    transform:scale(1.05);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>스팸 필터링 프로젝트</h1>
    <p>원치 않던 메일로 고통받으셨나요?</p>

    <button onclick="location.href='next.html'">
        시작하기
    </button>
</div>

</body>
</html>
