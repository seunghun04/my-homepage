<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자동화 필터링 시스템 - 메인</title>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* 1. 기본 초기화 */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background-color: #fff; }

/* 2. 전체 페이지 레이아웃 (푸터 스크롤 공간 확보) */
body {
    font-family: 'Gothic A1', sans-serif;
    min-height: calc(100vh + 65px); /* 화면 높이에 푸터 두께를 더해 스크롤 생성 */
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* 푸터를 항상 문서 맨 바닥에 배치 */
    overflow-x: hidden;
}

.main-background {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
    background: url("giphy.gif") center/cover no-repeat;
    transition: filter 0.4s ease;
}

/* 3. 상단 네비게이션바 (로고 완전 정중앙 보정 및 유튜브 영역 추가) */
.top-navbar { 
    position: fixed; top: 0; left: 0; width: 100%; height: 70px; 
    background: rgba(255,255,255,0.95); z-index: 2000; 
    display: flex; justify-content: space-between; align-items: center; padding: 0 50px; 
}

/* 🎯 [수정] 좌측 상단 로고의 폰트를 Playwrite 필기체로 지정하고 크기를 자연스럽게 맞췄습니다 */
.nav-logo { 
    font-family: "Playwrite AU VIC Guides", cursive;
    font-weight: 400; 
    font-size: 22px; 
    cursor: pointer; 
    color: #222; 
    z-index: 2100; 
     
}

/* 중앙 이미지 로고 (우측 메뉴 부피에 상관없이 전체 화면 기준 완벽한 50% 정중앙 정렬) */
.nav-center-logo { 
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 2050;
}
.nav-center-logo img { height: 55px; cursor: pointer; display: block; }

/* 우측 영역 상자 (유튜브 버튼 + 햄버거 메뉴 정렬용) */
.nav-right-area {
    display: flex;
    align-items: center;
    gap: 25px; /* 유튜브 아이콘과 햄버거 버튼 사이의 간격 */
    height: 100%;
    z-index: 2100;
}

/* 유튜브 버튼 스타일 */
.youtube-btn {
    font-size: 28px; /* 아이콘 크기 */
    color: #555; /* 평소 아이콘 색상 */
    display: flex;
    align-items: center;
    text-decoration: none;
    transition: color 0.3s, transform 0.3s;
}
/* 마우스 올렸을 때 효과 */
.youtube-btn:hover {
    color: #ff0000; /* 유튜브 레드 브랜드 컬러 */
    transform: scale(1.1); /* 살짝 커지는 애니메이션 */
}

.nav-menu-wrapper { display: flex; align-items: center; cursor: pointer; height: 100%; }
.hamburger-btn { display: flex; flex-direction: column; justify-content: space-between; width: 25px; height: 18px; z-index: 3000; }
.hamburger-btn span { width: 100%; height: 3px; background: #222; border-radius: 2px; transition: 0.3s; }
.nav-menu-wrapper:hover .hamburger-btn span { background-color: #00bcd4; }

.side-navbar { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; padding: 100px 30px; gap: 20px; transition: right 0.4s; z-index: 2500; box-shadow: -5px 0 25px rgba(0,0,0,0.1); }
.nav-menu-wrapper:hover .side-navbar, .side-navbar:hover { right: 0; }
.nav-item { font-size: 18px; color: #444; font-weight: 600; text-decoration: none; padding: 12px; transition: 0.3s; border-radius: 8px; display: block; }
.nav-item:hover { background: rgba(0,188,212,0.08); color: #00bcd4; padding-left: 22px; }
body:has(.nav-menu-wrapper:hover) .main-background { filter: blur(3px); }

/* 4. 중앙 메인 콘텐츠 영역 (화면 정중앙에 완전 고정) */
.container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 650px;
    text-align: center;
    z-index: 1000;
}

/* 5. 텍스트 컨테이너 및 애니메이션 */
#text-box {
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
    opacity: 1;
    transform: translateX(0);
}
#text-box.slide-out { opacity: 0; transform: translateX(-50px); }
#text-box.slide-prep { opacity: 0; transform: translateX(50px); transition: none; }

/* 6. 글씨 및 섀도우 효과 */
h1 {
    color: #fff; font-size: 34px; font-weight: 700; margin-bottom: 16px;
    text-shadow: 0 0 15px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.8), 0 0 70px rgba(0,0,0,0.7);
}
p {
    color: #fff; font-size: 18px; margin-bottom: 0;
    text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    opacity: 0; transition: opacity 1s;
}
#main-text::after { content: "|"; animation: blink 0.8s infinite; margin-left: 3px; font-weight: 400; text-shadow: none; }
.typing-done::after { display: none; }
@keyframes blink { 50% { opacity: 0; } }

/* 7. 우측 넘김 화살표 버튼 (중앙 우측 배치 및 클릭 영역 복구) */
.next-arrow-btn {
    position: absolute; 
    right: -60px; top: 28%; 
    width: 44px; height: 44px; 
    background: transparent !important; border: none !important; outline: none !important;
    cursor: pointer; z-index: 1050; 
    display: none; align-items: center; justify-content: center; 
    opacity: 0; transition: opacity 0.8s;
    -webkit-tap-highlight-color: transparent;
}
.next-arrow-btn::after {
    content: ''; display: block; width: 16px; height: 16px;
    border-top: 3px solid rgba(255,255,255,0.5); border-right: 3px solid rgba(255,255,255,0.5);
    transform: rotate(45deg); transition: 0.3s;
}
.next-arrow-btn:hover::after { border-color: rgba(255,255,255,1); transform: rotate(45deg) scale(1.15); }

/* 8. 카운터 영역 */
.counter-box { margin-top: 40px; opacity: 0; transition: opacity 1s; }
.counter-label { display: block; color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 10px; text-shadow: 0 0 8px rgba(0,0,0,0.9); }
#counter { font-size: 48px; font-weight: 700; color: #00e5ff; text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 25px rgba(0,0,0,0.7); }

/* 9. 하단 푸터 (스크롤을 완전히 내렸을 때만 바닥에서 등장) */
.bottom-footer { 
    position: relative;
    width: 100%; height: 65px; 
    background: rgba(255,255,255,0.6); 
    backdrop-filter: blur(5px);
    border-top: 1px solid rgba(255,255,255,0.3); 
    display: flex; justify-content: space-between; align-items: center; padding: 0 50px; 
    z-index: 2000; font-size: 13px; color: #333; 
}
.footer-info { display: flex; gap: 24px; }
.footer-info strong { color: #111; }

@media (max-width: 768px) {
    .bottom-footer { flex-direction: column; height: auto; padding: 15px; gap: 8px; text-align: center; }
    body { min-height: calc(100vh + 100px); }
    .next-arrow-btn { right: -10px; top: 25%; }
    /* 모바일 가독성을 위해 반응형 폰트 살짝 조정 */
    .nav-logo { font-size: 18px; }
    .nav-right-area { gap: 15px; } 
    .youtube-btn { font-size: 24px; }
}
</style>
</head>
<body>

<div class="main-background"></div>

<header class="top-navbar">
    <div class="nav-logo" onclick="location.href='index.html'">Automation System</div>
    
    <div class="nav-center-logo" onclick="location.href='index.html'"><img src="ui_symbol.png" alt="로고"></div>
    
    <div class="nav-right-area">
        <a href="https://www.youtube.com/@tmdgns1130" target="_blank" class="youtube-btn" title="유튜브 채널 이동">
            <i class="fa-brands fa-youtube"></i>
        </a>
        <div class="nav-menu-wrapper">
            <div class="hamburger-btn"><span></span><span></span><span></span></div>
            <nav class="side-navbar">
                <a class="nav-item" href="about.html">제품소개</a>
                <a class="nav-item" href="download.html">다운로드</a>
            </nav>
        </div>
    </div>
</header>

<main class="container">
    <div id="text-box">
        <h1 id="main-text"></h1>
        <p id="sub-text">원치 않던 메일로 고통받으셨나요?</p>
    </div>

    <button class="next-arrow-btn" id="nextBtn" onclick="nextSlide()"></button>

    <div class="counter-box">
        <span class="counter-label">누적 차단된 스팸 메일</span>
        <h2 id="counter">0</h2>
    </div>
</main>

<footer class="bottom-footer">
    <div class="footer-info">
        <span><strong>이메일:</strong> ok84638@email.com</span>
        <span><strong>전화번호:</strong> 010-5609-3193</span>
        <span><strong>주소지:</strong> 강원특별자치도 춘천시 동산면 영서로 1290-31</span>
    </div>
    <div style="color:#666;">&copy; 2026 자동화 필터링 시스템. All Rights Reserved.</div>
</footer>

<script>
const slideData = [
    { title: "스팸 필터링 프로젝트", desc: "원치 않던 메일로 고통받으셨나요?" },
    { title: "안전한 업무 파트너", desc: "인공지능 실시간 분석으로 피싱 메일을 원천 차단합니다." },
    { title: "스마트한 메일 분석기", desc: "강력한 필터링 엔진이 사용자의 소중한 정보를 보호합니다." }
];

let currentSlide = 0;
let isSliding = false;

const mainText = document.getElementById("main-text");
const subText = document.getElementById("sub-text");
const textBox = document.getElementById("text-box");
const nextBtn = document.getElementById("nextBtn");

let typeIdx = 0;
function typing() {
    if(typeIdx < slideData[0].title.length) {
        mainText.innerHTML += slideData[0].title.charAt(typeIdx);
        typeIdx++;
        setTimeout(typing, 120);
    } else {
        subText.style.opacity = "1";
        setTimeout(startCounter, 800);
    }
}
window.onload = typing;

function startCounter() {
    document.querySelector('.counter-box').style.opacity = "1";
    let current = 0;
    let targetNum = 152847;
    
    let timer = setInterval(() => {
        current += Math.ceil((targetNum - current) / 15);
        document.getElementById("counter").innerText = current.toLocaleString();
        
        if(current >= targetNum) {
            document.getElementById("counter").innerText = targetNum.toLocaleString();
            clearInterval(timer);
            nextBtn.style.display = "flex"; 
            setTimeout(() => { nextBtn.style.opacity = "1"; }, 50);
        }
    }, 30);
}

function nextSlide() {
    if (isSliding) return;
    isSliding = true;

    textBox.classList.add("slide-out");

    setTimeout(() => {
        currentSlide = (currentSlide + 1) % slideData.length;
        mainText.innerHTML = slideData[currentSlide].title;
        subText.innerHTML = slideData[currentSlide].desc;
        
        mainText.classList.add("typing-done");
        subText.style.opacity = "1"; 

        textBox.classList.remove("slide-out");
        textBox.classList.add("slide-prep");
        
        void textBox.offsetWidth;

        textBox.classList.remove("slide-prep");

        setTimeout(() => { isSliding = false; }, 400);
    }, 400); 
}
</script>
</body>
</html>
