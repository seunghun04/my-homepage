<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스팸 필터링 프로젝트</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Nanum Pen Script', cursive;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.5px;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    /* 배경 설정 */
    background: 
        linear-gradient(-45deg, rgba(238, 242, 243, 0.1), rgba(224, 234, 252, 0.1), rgba(207, 217, 223, 0.1), rgba(226, 235, 240, 0.1)),
        url("프로젝트 v2.png") center no-repeat;
    
    /* 🛠️ 변경: 평소에는 이미지가 화면을 빈틈없이 꽉 채우도록 150%로 넉넉하게 설정 */
    background-size: 150% 150%, cover;
    background-attachment: fixed;
    
    animation: gradientMovement 15s ease infinite;

    /* 배경 크기 변화를 0.8초간 부드럽게 연결 */
    transition: background-size 0.8s cubic-bezier(0.25, 1, 0.5, 1);
}

/* 👇 버튼 클릭 시 body에 shrink-effect가 붙을 때 */
body.shrink-effect {
    /* 🛠️ 변경: 이미지가 쪼개져서 정사각 박스로 남지 않도록, 화면 높이/너비에 딱 맞게(100%) 축소시킵니다 */
    background-size: 100% 100%, cover; 
    animation: none; 
}

@keyframes gradientMovement {
    0% { background-position: 0% 50%, center; }
    50% { background-position: 100% 50%, center; }
    100% { background-position: 0% 50%, center; }
}

.container{
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(10px);

    width: 90%;            
    max-width: 420px;
    padding: 25px 35px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

    animation: fadeInUp 1s ease-out forwards;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}

.container.fade-out {
    opacity: 0;
    transform: scale(0.85);
}

h1{
    color:#333;
    margin-bottom:10px;
    font-size: 56px;
    font-weight: 400;
    line-height: 1.1;
}

p{
    color:#555;
    margin-bottom:30px;
    font-size: 34px;
    font-weight: 400;
    line-height: 1.1;
}

button{
    background:#bacbde;
    color:white;
    border:none;
    padding:10px 35px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    font-family: 'Nanum Pen Script', cursive;
    font-size: 30px;
    line-height: 1;
}

button:hover{
    background:#64e7f6;
    transform:scale(1.05);
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container" id="mainContainer">
    <h1>스팸 필터링 프로젝트</h1>
    <p>원치 않던 메일로 고통받으셨나요?</p>

    <button onclick="startTransition()">
        시작하기
    </button>
</div>

<script>
function startTransition() {
    const body = document.body;
    const container = document.getElementById('mainContainer');

    container.classList.add('fade-out');
    body.classList.add('shrink-effect');

    setTimeout(function() {
        location.href = 'next.html';
    }, 800); 
}
</script>

</body>
</html>
