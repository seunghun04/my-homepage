<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>필터링 프로그램 알아보기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    /* 👇 웹페이지 내에서 실시간으로 생성되는 오로라 같은 그라데이션 배경 */
    background: linear-gradient(-45deg, #eef2f3, #e0eafc, #cfd9df, #e2ebf0);
    
    /* 배경이 움직일 수 있도록 크기를 키워줍니다 */
    background-size: 400% 400%;
    
    /* 💥 15초 동안 배경이 아주 부드럽게 일렁이도록 애니메이션 실행 (무한 반복) */
    animation: gradientMovement 15s ease infinite;
}

/* 👇 배경의 색상 축이 파도치듯 서서히 변하는 애니메이션 규칙 */
@keyframes gradientMovement {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

.container{
    /* 중앙 박스를 약간 투명하게 만들어 움직이는 배경이 은은하게 비치도록 연출 */
    background: rgba(255, 255, 255, 0.75);
    /* 뒤쪽 배경을 흐리게 처리하는 유리에 반사된 듯한(Glassmorphism) 효과 추가 */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

    /* 중앙 박스 등장 애니메이션 */
    animation: fadeInUp 1s ease-out forwards;
    opacity: 0;
    transform: translateY(30px);
}

h1{
    color:#333;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
    font-size:18px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.05);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>필터링 프로그램 알아보기</h1>
    <p>원치 않는 텍스트를 걸러내는 방법</p>

    <button onclick="location.href='next.html'">
        시작하기
    </button>
</div>

</body>
</html>
