<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>필터링 프로그램 알아보기</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    /* 👇 전체 글꼴을 'Dongle'로 지정하고 부드럽게 다듬는 속성 추가 */
    font-family: 'Dongle', sans-serif;
    -webkit-font-smoothing: antialiased;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    /* 회원님의 배경 설정 그대로 유지 */
    background: 
        linear-gradient(-45deg, rgba(238, 242, 243, 0.1), rgba(224, 234, 252, 0.1), rgba(207, 217, 223, 0.1), rgba(226, 235, 240, 0.1)),
        url("프로젝트 v2.png") center no-repeat;
    
    background-size: 200% 200%, cover;
    background-attachment: fixed;
    
    animation: gradientMovement 15s ease infinite;
}

@keyframes gradientMovement {
    0% {
        background-position: 0% 50%, center;
    }
    50% {
        background-position: 100% 50%, center;
    }
    100% {
        background-position: 0% 50%, center;
    }
}

.container{
    /* 회원님의 투명도 0.01 및 흐림 설정 그대로 유지 */
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

    animation: fadeInUp 1s ease-out forwards;
    opacity: 0;
    transform: translateY(30px);
}

h1{
    color:#333;
    margin-bottom:15px;
    /* 👇 Dongle 폰트 특성에 맞춰 크기와 줄간격 최적화 */
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
}

p{
    color:#555;
    margin-bottom:25px;
    /* 👇 Dongle 폰트 특성에 맞춰 크기와 줄간격 최적화 */
    font-size: 28px;
    font-weight: 400;
    line-height: 1.1;
}

button{
    /* 회원님의 파스텔톤 버튼 색상 그대로 유지 */
    background:#bacbde;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;

    /* 👇 버튼 안의 글자도 동글 폰트 적용 및 크기 최적화 */
    font-family: 'Dongle', sans-serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
}

button:hover{
    /* 회원님의 호버 시 색상 및 크기 변화 그대로 유지 */
    background:#76b2f5;
    transform:scale(1.05);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>필터링 프로그램 알아보기</h1>
    <p>원치 않는 텍스트를 걸러내는 방법</p>

    <button onclick="location.href='next.html'">
        시작하기
    </button>
</div>

</body>
</html>
