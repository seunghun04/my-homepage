<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>필터링 프로그램 알아보기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;

    /* 👇 핵심 수정: 그라데이션에 반투명(rgba) 효과를 주고 이미지 위로 올렸습니다 */
    background: 
        linear-gradient(-45deg, rgba(238, 242, 243, 0.1), rgba(224, 234, 252, 0.1), rgba(207, 217, 223, 0.1), rgba(226, 235, 240, 0.1)),
        url("프로젝트 v2.png") center no-repeat;
    
    /* 이미지와 그라데이션이 화면 전체에 꽉 차도록 설정 */
    background-size: 200% 200%, cover;
    background-attachment: fixed;
    
    /* 💥 15초 동안 그라데이션이 파도치듯 은은하게 움직이는 애니메이션 (무한 반복) */
    animation: gradientMovement 15s ease infinite;
}

/* 👇 배경의 색상 축이 서서히 변하는 애니메이션 규칙 (이미지는 가만히 유지) */
@keyframes gradientMovement {
    0% {
        background-position: 0% 50%, center;
    }
    50% {
        background-position: 100% 50%, center;
    }
    100% {
        background-position: 0% 50%, center;
    }
}

.container{
    /* 중앙 박스를 투명도 0.8로 주어 뒤의 움직이는 배경이 은은하게 비치도록 연출 */
    background: rgba(255, 255, 255, 0.1);
    /* 유리에 반사된 듯 배경을 뿌옇게 흐리는 효과 */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);

    /* 중앙 박스 등장 애니메이션 */
    animation: fadeInUp 1s ease-out forwards;
    opacity: 0;
    transform: translateY(30px);
}

h1{
    color:#333;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
    font-size:18px;
}

button{
    background:#bacbde;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#76b2f5;
    transform:scale(1.05);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>필터링 프로그램 알아보기</h1>
    <p>원치 않는 텍스트를 걸러내는 방법</p>

    <button onclick="location.href='next.html'">
        시작하기
    </button>
</div>

</body>
</html>
